name: Feature Request
description: Suggest a new feature
title: "feature: "
labels: [enhancement]
body:
  - type: checkboxes
    attributes:
      label: Did you check the docs?
      description: Make sure you read the README before submitting a feature request
      options:
        - label: I have read the lazysqlx README
          required: true
  - type: textarea
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is.
      placeholder: |
        I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: |
        When I press <C-n>, I should be prompted for a migration name and have both up/down files scaffolded.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Acceptance Criteria
      description: What must be available to the user for this to be closed.
      placeholder: |
        The user must be able to create a new reversible migration without leaving the TUI.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe alternatives/other solutions you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
      placeholder: |
        lazygit does something similar with its `n` keybind in the commits panel.
    validations:
      required: false
